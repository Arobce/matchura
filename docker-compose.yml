services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: auth_db,profile_db,job_db,application_db,ai_db,notification_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: matchura
      RABBITMQ_DEFAULT_PASS: matchura_dev
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@matchura.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  auth-service:
    build:
      context: .
      dockerfile: src/services/AuthService/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      DATABASE_URL: "Host=postgres;Database=auth_db;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      REDIS_CONNECTION: ${REDIS_CONNECTION}
    ports:
      - "5001:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  profile-service:
    build:
      context: .
      dockerfile: src/services/ProfileService/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      DATABASE_URL: "Host=postgres;Database=profile_db;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      REDIS_CONNECTION: ${REDIS_CONNECTION}
    ports:
      - "5002:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  job-service:
    build:
      context: .
      dockerfile: src/services/JobService/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      DATABASE_URL: "Host=postgres;Database=job_db;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      REDIS_CONNECTION: ${REDIS_CONNECTION}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: matchura
      RABBITMQ_PASS: matchura_dev
    ports:
      - "5003:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  application-service:
    build:
      context: .
      dockerfile: src/services/ApplicationService/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      DATABASE_URL: "Host=postgres;Database=application_db;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      REDIS_CONNECTION: ${REDIS_CONNECTION}
      JOB_SERVICE_URL: "http://job-service:8080"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: matchura
      RABBITMQ_PASS: matchura_dev
    ports:
      - "5004:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      job-service:
        condition: service_started

  ai-service:
    build:
      context: .
      dockerfile: src/services/AIService/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      DATABASE_URL: "Host=postgres;Database=ai_db;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      REDIS_CONNECTION: ${REDIS_CONNECTION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-matchura-uploads}
      JOB_SERVICE_URL: "http://job-service:8080"
      APPLICATION_SERVICE_URL: "http://application-service:8080"
      PROFILE_SERVICE_URL: "http://profile-service:8080"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: matchura
      RABBITMQ_PASS: matchura_dev
    ports:
      - "5005:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      job-service:
        condition: service_started
      application-service:
        condition: service_started

  notification-service:
    build:
      context: .
      dockerfile: src/services/NotificationService/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      DATABASE_URL: "Host=postgres;Database=notification_db;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      REDIS_CONNECTION: ${REDIS_CONNECTION}
      JOB_SERVICE_URL: "http://job-service:8080"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: matchura
      RABBITMQ_PASS: matchura_dev
    ports:
      - "5006:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      job-service:
        condition: service_started

  api-gateway:
    build:
      context: .
      dockerfile: src/services/ApiGateway/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
    ports:
      - "5010:8080"
    depends_on:
      - auth-service
      - profile-service
      - job-service
      - application-service
      - ai-service
      - notification-service

  frontend:
    build:
      context: src/frontend/web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
    ports:
      - "3001:3000"
    depends_on:
      - api-gateway

volumes:
  postgres_data:
  redis_data:
