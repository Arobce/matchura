name: Deploy to Railway (Dev)

on:
  push:
    branches: [dev]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Run unit tests
        run: |
          for project in AuthService ProfileService JobService ApplicationService AIService NotificationService; do
            dotnet test "tests/${project}.UnitTests" --no-build --logger "console;verbosity=normal"
          done

      - name: Run integration tests
        run: |
          for project in JobService ApplicationService; do
            dotnet test "tests/${project}.IntegrationTests" --no-build --logger "console;verbosity=normal"
          done

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend/web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/frontend/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit & component tests
        run: npx vitest run

  deploy:
    name: Deploy Services
    needs: [backend-tests, frontend-tests]
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy Auth Service
        run: railway up --service auth-service --dockerfile src/services/AuthService/Dockerfile --detach

      - name: Deploy Profile Service
        run: railway up --service profile-service --dockerfile src/services/ProfileService/Dockerfile --detach

      - name: Deploy Job Service
        run: railway up --service job-service --dockerfile src/services/JobService/Dockerfile --detach

      - name: Deploy Application Service
        run: railway up --service application-service --dockerfile src/services/ApplicationService/Dockerfile --detach

      - name: Deploy AI Service
        run: railway up --service ai-service --dockerfile src/services/AIService/Dockerfile --detach

      - name: Deploy API Gateway
        run: railway up --service api-gateway --dockerfile src/services/ApiGateway/Dockerfile --detach

      - name: Deploy Frontend
        run: railway up --service frontend --dockerfile src/frontend/web/Dockerfile --detach

  sentry-release:
    name: Create Sentry Release
    needs: [deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Sentry release
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: roshan-chapagain
        with:
          projects: matchura-backend matchura-frontend
          environment: development
